<?xml version="1.0"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root may own the service name. -->
  <policy user="root">
    <allow own="com.tiunda.ZWaved"/>
    <allow send_destination="com.tiunda.ZWaved"/>
    <allow receive_sender="com.tiunda.ZWaved"/>
  </policy>

  <!-- Other users may call methods and receive signals. Tighten this to a
       specific group (e.g., "zwave") in production by replacing context with
       group="zwave" and listing the allowed methods explicitly. -->
  <policy context="default">
    <allow send_destination="com.tiunda.ZWaved"
           send_interface="com.tiunda.ZWaved1"/>
    <allow send_destination="com.tiunda.ZWaved"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="com.tiunda.ZWaved"
           send_interface="org.freedesktop.DBus.Peer"/>
    <allow send_destination="com.tiunda.ZWaved"
           send_interface="org.freedesktop.DBus.Properties"/>
    <allow receive_sender="com.tiunda.ZWaved"/>
  </policy>
</busconfig>
