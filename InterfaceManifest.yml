# InterfaceManifest.yml
#
# Canonical description of the daemon's external and internal message
# surface. Every cross-module contract lives here -- in-process
# MessageBus event shapes, the D-Bus method/signal surface, and the
# protocol-specific wire frames that ride inside SendData payloads.
#
# The CMake-time code generator (scripts/codegen/) reads this file and
# emits MessageBus.{hpp,cpp} event structs, the D-Bus method/signal
# bindings in DBusBackend.cpp, and per-module codec skeletons. A
# discrepancy between the manifest and the generated files is a bug in
# the manifest; a discrepancy between manifest and hand-written code
# referencing the generated names is a bug in that hand-written code.
#
# ----- Schema overview ----------------------------------------------
# Top-level sections (each described in its own block below):
#
#   structs:       reusable nested shapes referenced by events / DBus
#   events:        MessageBus event definitions (state / config /
#                  transient / command categories)
#   dbus:          methods + signals + bus_name / object_path / interface
#   modules:       per-feature codec definitions. Wire-specific bits
#                  (class_byte, prefix, per-command byte) live under
#                  nested `wire:` blocks so the surrounding schema
#                  stays protocol-agnostic — a future second-protocol
#                  daemon (Zigbee, KNX, …) reuses the same schema with
#                  its own `wire:` keys.
#   translations:  rules driving the cc-translator module — subscribe
#                  to a raw event, run a codec, republish a typed event.
#
# ----- Type system ---------------------------------------------------
# Field types map cleanly onto both C++ and D-Bus:
#
#   bool         cpp: bool                          dbus: b
#   u8           cpp: std::uint8_t                  dbus: y
#   u16          cpp: std::uint16_t                 dbus: q
#   u32          cpp: std::uint32_t                 dbus: u
#   u64          cpp: std::uint64_t                 dbus: t
#   string       cpp: std::string                   dbus: s
#   bytes        cpp: std::vector<std::uint8_t>     dbus: ay
#   array<T, N>  cpp: std::array<T, N>              dbus: a<T> (no length check)
#   list<T>      cpp: std::vector<T>                dbus: a<T>
#   struct ref   cpp: <Name>                        dbus: (<fields...>)
#
# `default:` documents the wire-level default the codegen should emit
# in the C++ struct's member initializer. `doc:` is human-only.

version: 1

# =====================================================================
# 1. Nested structs
# =====================================================================
# Reusable shapes referenced by `events` and the D-Bus surface. Each
# becomes a plain C++ struct in the codegen output; they are not
# subscribable/publishable on the bus on their own.

structs:

  - name: NodeInfo
    doc: One node entry in the persistent registry.
    fields:
      - { name: nodeId,         type: u8,     default: 0 }
      - { name: basicType,      type: u8,     default: 0 }
      - { name: genericType,    type: u8,     default: 0 }
      - { name: specificType,   type: u8,     default: 0 }
      - { name: commandClasses, type: bytes }

  - name: AcceptedDongleConfig
    doc: One accepted USB dongle identity (VID/PID/name).
    fields:
      - { name: vid,  type: string, doc: "4-char lowercase hex" }
      - { name: pid,  type: string, doc: "4-char lowercase hex" }
      - { name: name, type: string }

  - name: EndpointMember
    doc: |
      One node:endpoint pair carried by Multi Channel Association
      commands and reports. Mirrors the application-layer codec's
      EndpointMember; redeclared so the bus header is independent of
      application/.
    fields:
      - { name: nodeId,   type: u8, default: 0 }
      - { name: endpoint, type: u8, default: 0 }

# =====================================================================
# 2. MessageBus events
# =====================================================================
# Every event published on the in-process bus. `category` controls how
# the codegen treats it:
#
#   state      - retained: late subscribers receive the latest value on
#                subscribe. Specialize IsRetained<T> to true_type.
#   config     - retained, populated once at startup by Config.
#   transient  - not retained.
#   command    - not retained; published from external transports,
#                consumed by ProtocolThread.
#
# `direction` is documentation: who publishes, who subscribes.

events:

  # ---- 2a. State (retained) ---------------------------------------
  - name: DongleStatus
    category: state
    direction: { publishers: [zwave-dongle], subscribers: [external-api, zwave-protocol] }
    doc: Lifecycle state of the Z-Wave dongle's serial attachment.
    fields:
      - { name: connected, type: bool,   default: false }
      - { name: ttyPath,   type: string, doc: "empty unless connected" }

  - name: DongleInfo
    category: state
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: |
      Static introspection from FUNC_ID_GET_VERSION + FUNC_ID_MEMORY_GET_ID
      after the serial port opens.
    fields:
      - { name: libraryVersion,   type: string, doc: "e.g. 'Z-Wave 6.07'" }
      - { name: libraryType,      type: u8,     default: 0 }
      - { name: homeId,           type: bytes,  doc: "4 bytes" }
      - { name: controllerNodeId, type: u8,     default: 0 }

  - name: InitData
    category: state
    direction: { publishers: [zwave-protocol], subscribers: [external-api, node-registry] }
    doc: FUNC_ID_SERIAL_API_GET_INIT_DATA (0x02) RESPONSE — startup snapshot.
    fields:
      - { name: serialApiVersion, type: u8,    default: 0 }
      - { name: capabilities,     type: u8,    default: 0, doc: "bit 0=secondary, 1=no-send, 2=SIS, 3=real-primary" }
      - { name: chipType,         type: u8,    default: 0 }
      - { name: chipVersion,      type: u8,    default: 0 }
      - { name: nodeIds,          type: bytes, doc: "expanded node bitmap" }

  - name: NodeListChanged
    category: state
    direction: { publishers: [node-registry], subscribers: [external-api] }
    doc: Snapshot of the node registry. Republished on add/remove/seed/setHomeId.
    fields:
      - { name: nodes, type: list<NodeInfo> }

  - name: SessionStatus
    category: state
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: |
      Mirror of the protocol thread's inclusion/exclusion session
      tracker, so external observers can answer "is a session in
      flight" without reaching into protocol internals.
    fields:
      - { name: active,    type: bool, default: false }
      - { name: commandId, type: u8,   default: 0, doc: "HostApi::CMD_ADD_NODE_TO_NETWORK / CMD_REMOVE_NODE_FROM_NETWORK / 0" }
      - { name: sessionId, type: u8,   default: 0 }

  - name: DaemonError
    category: state
    direction: { publishers: [zwave-protocol, zwave-dongle, external-api, config], subscribers: [external-api] }
    doc: |
      Structured error feed — the operator-visible counterpart to
      Logger::error / journald lines. Retained so a D-Bus client
      connecting after a failure still sees the most recent one
      (mirrors how GetNetworkStatus exposes the latest cached
      DongleStatus / DongleInfo). An empty `message` on the default-
      constructed value means "no error yet"; publishers may also
      publish a default-constructed DaemonError as an explicit
      "recovered, no current problem" signal.

      `severity` aligns with Logger::Level (1..3) plus a Critical
      step for failures that imply the daemon can't make progress at
      all. `source` is the publishing module's name as a free-form
      string ("zwave-protocol", "zwave-dongle", etc) so adding a new
      publisher doesn't require an enum extension. `code` is one of
      the constants below — extend the enum when a new operator-
      meaningful failure class shows up.
    constants:
      - { name: SEVERITY_INFO,     value: 1 }
      - { name: SEVERITY_WARN,     value: 2 }
      - { name: SEVERITY_ERROR,    value: 3 }
      - { name: SEVERITY_CRITICAL, value: 4, doc: "daemon can't make progress in its current mode" }

      # Code high-nibble groups by source module so a quick visual
      # scan tells you where the failure came from; low nibble is a
      # within-module ordinal. Codegen emits constants as `std::uint8_t`
      # today, so codes must fit in a byte; if/when the manifest gets a
      # constant-type hint, this layout can expand to u16.
      - { name: CODE_NONE,                        value: 0x00, doc: "default — no error to report" }
      - { name: CODE_DONGLE_OPEN_FAILED,          value: 0x10, doc: "serial port open() / configure failed" }
      - { name: CODE_DONGLE_INTROSPECTION_FAILED, value: 0x11, doc: "GET_VERSION or MEMORY_GET_ID didn't answer" }
      - { name: CODE_UDEV_INIT_FAILED,            value: 0x20, doc: "libudev context or monitor creation failed" }
      - { name: CODE_DBUS_BIND_FAILED,            value: 0x30, doc: "couldn't acquire the system-bus name" }
      - { name: CODE_EXTERNAL_API_NO_BACKEND,     value: 0x31, doc: "no external-API backend compiled in" }
      - { name: CODE_CONFIG_LOAD_FAILED,          value: 0x40, doc: "config file present but unreadable / malformed" }
    fields:
      - { name: severity, type: u8,     default: SEVERITY_INFO }
      - { name: source,   type: string, doc: "publishing module — e.g. 'zwave-protocol'" }
      - { name: code,     type: u8,     default: CODE_NONE }
      - { name: message,  type: string, doc: "human-readable; empty for default 'no error' value" }

  # ---- 2b. Configuration (retained, set once at startup) -----------
  # Published once by Config (priority 102) after parsing zwaved.conf;
  # consumers subscribe from their own constructor and pick up the
  # cached value via replay-on-subscribe.

  - name: LoggerConfig
    category: config
    direction: { publishers: [config], subscribers: [logger] }
    doc: Logger threshold. minLevel is the underlying integer of Logger::Level.
    fields:
      - { name: minLevel, type: u8, default: 1, doc: "0=Debug, 1=Info, 2=Warn, 3=Error" }

  - name: DonglesConfig
    category: config
    direction: { publishers: [config], subscribers: [zwave-dongle] }
    doc: USB dongles the monitor thread will recognise.
    fields:
      - { name: accept, type: list<AcceptedDongleConfig> }

  - name: StorageConfig
    category: config
    direction: { publishers: [config], subscribers: [node-registry] }
    doc: Storage paths. Empty stateDir means fall back to env / built-in default.
    fields:
      - { name: stateDir, type: string }

  - name: BehaviorConfig
    category: config
    direction: { publishers: [config], subscribers: [zwave-protocol] }
    doc: Daemon-wide feature toggles.
    fields:
      - { name: autoLifeline, type: bool, default: true }

  # ---- 2c. Transient protocol events ------------------------------

  - name: ApplicationCommand
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api, cc-translator] }
    doc: Unsolicited CC frame inside FUNC_ID_APPLICATION_COMMAND_HANDLER (0x04).
    fields:
      - { name: rxStatus,     type: u8,    default: 0 }
      - { name: sourceNodeId, type: u8,    default: 0 }
      - { name: ccData,       type: bytes }

  - name: NodeInclusionStatus
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: Decoded callback for FUNC_ID_ZW_ADD_NODE_TO_NETWORK (0x4A).
    fields:
      - { name: sessionId,          type: u8,  default: 0 }
      - { name: status,             type: u8,  default: 0 }
      - { name: nodeId,             type: u16, default: 0 }
      - { name: basicDeviceType,    type: u8,  default: 0 }
      - { name: genericDeviceType,  type: u8,  default: 0 }
      - { name: specificDeviceType, type: u8,  default: 0 }
      - { name: commandClasses,     type: bytes }

  - name: NodeExclusionStatus
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: Decoded callback for FUNC_ID_ZW_REMOVE_NODE_FROM_NETWORK (0x4B).
    fields:
      - { name: sessionId,          type: u8,  default: 0 }
      - { name: status,             type: u8,  default: 0 }
      - { name: nodeId,             type: u16, default: 0 }
      - { name: basicDeviceType,    type: u8,  default: 0 }
      - { name: genericDeviceType,  type: u8,  default: 0 }
      - { name: specificDeviceType, type: u8,  default: 0 }
      - { name: commandClasses,     type: bytes }

  - name: SendDataCallback
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: Decoded callback for FUNC_ID_ZW_SEND_DATA (0x13) completion.
    fields:
      - { name: callbackId, type: u8, default: 0 }
      - { name: txStatus,   type: u8, default: 0, doc: "0=OK, 1=NoAck, 2=Fail, 3=NotIdle, 4=NoRoute, 5=Verified" }

  - name: RemoveFailedNodeStatus
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: |
      Progress signal for FUNC_ID_ZW_REMOVE_FAILED_NODE_ID (0x61).
      Emitted twice for a typical removal: phase=PHASE_RESPONSE
      carries the synchronous response, phase=PHASE_CALLBACK the
      async callback.
    constants:
      - { name: PHASE_RESPONSE, value: 0 }
      - { name: PHASE_CALLBACK, value: 1 }
    fields:
      - { name: nodeId,    type: u8, default: 0 }
      - { name: sessionId, type: u8, default: 0 }
      - { name: phase,     type: u8, default: PHASE_RESPONSE }
      - { name: status,    type: u8, default: 0, doc: "interpretation depends on phase" }

  - name: RequestNodeInfoStatus
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api] }
    doc: |
      Synchronous response to FUNC_ID_ZW_REQUEST_NODE_INFO (0x60).
      `accepted` says whether the dongle accepted the request and
      will attempt to ferry it over the air. The actual NodeInfo
      payload arrives later — unsolicited — as a NodeInfoUpdate
      event (which fires for both requested and unprompted NIFs).
    fields:
      - { name: nodeId,    type: u8,   default: 0 }
      - { name: sessionId, type: u8,   default: 0 }
      - { name: accepted,  type: bool, default: false }

  - name: NodeInfoUpdate
    category: transient
    direction: { publishers: [zwave-protocol], subscribers: [external-api, node-registry] }
    doc: |
      Decoded FUNC_ID_APPLICATION_UPDATE (0x49) payload. Fires both in
      response to a prior REQUEST_NODE_INFO and unsolicited (a node
      sending a NIF after waking up); correlated to a request only by
      nodeId. `status` distinguishes the case:
        0x81 NODE_INFO_REQ_FAILED  — node didn't reply within the
                                     dongle's window (sleeping / out
                                     of range). device-class and CCs
                                     are unset.
        0x84 NODE_INFO_RECEIVED    — full NodeInfo arrived. The
                                     daemon also updates NodeRegistry.
      Other statuses (SUC_ID, NEW_ID_ASSIGNED, ...) pass through; the
      payload-bearing fields are only populated for NODE_INFO_RECEIVED.
    constants:
      - { name: STATUS_NODE_INFO_REQ_FAILED, value: 0x81 }
      - { name: STATUS_NODE_INFO_RECEIVED,   value: 0x84 }
    fields:
      - { name: status,             type: u8,    default: 0 }
      - { name: nodeId,             type: u8,    default: 0 }
      - { name: basicDeviceType,    type: u8,    default: 0 }
      - { name: genericDeviceType,  type: u8,    default: 0 }
      - { name: specificDeviceType, type: u8,    default: 0 }
      - { name: commandClasses,     type: bytes }

  # ---- 2c'. Typed CC reports ---------------------------------------
  # The cc-translator module subscribes to ApplicationCommand events,
  # runs the application/ codec decoders, and republishes typed events
  # like the ones below. Lets external-api emit typed D-Bus signals
  # without ever including a CC codec header — the bus stays the only
  # seam between modules.

  - name: BinarySwitchReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Binary Switch (CC 0x25) Report. Republished by the
      cc-translator from inbound ApplicationCommand frames whose
      ccData parses as a Binary Switch Report. State follows the
      BinarySwitch::State enum: 0=Off, 1=On, 2=Unknown.
    fields:
      - { name: sourceNodeId, type: u8, default: 0 }
      - { name: state,        type: u8, default: 0, doc: "0=Off, 1=On, 2=Unknown" }

  - name: BatteryReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Battery (CC 0x80) Report. Republished by the cc-translator
      from inbound ApplicationCommand frames whose ccData parses as a
      Battery Report. `level` is the wire byte: 0x00..0x64 is a
      percentage (0–100 %); 0xFF means "battery low" with no precise
      gauge — surfaced separately as `lowBattery` so callers don't
      have to special-case the sentinel.
    fields:
      - { name: sourceNodeId, type: u8,   default: 0 }
      - { name: level,        type: u8,   default: 0 }
      - { name: lowBattery,   type: bool, default: false }

  - name: WakeUpIntervalReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Wake Up (CC 0x84) Interval Report. Republished by the
      cc-translator from inbound ApplicationCommand frames whose
      ccData parses as a Wake Up Interval Report. `seconds` is the
      node's current wake-up interval (0 means stay-awake / disabled
      for most devices); `controllerNodeId` is the node the sleeper
      will phone home to on wake-up.
    fields:
      - { name: sourceNodeId,     type: u8,  default: 0 }
      - { name: seconds,          type: u32, default: 0 }
      - { name: controllerNodeId, type: u8,  default: 0 }

  - name: WakeUpNotification
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api, orchestrator] }
    doc: |
      A sleeping node is briefly awake. Republished by the
      cc-translator from inbound ApplicationCommand frames whose
      ccData is `(0x84, 0x07)`. Consumed by WakeUpOrchestrator (#68)
      to drain any pending commands for `sourceNodeId` and then
      send WAKE_UP_NO_MORE_INFORMATION so the node sleeps again
      ASAP (battery).
    fields:
      - { name: sourceNodeId, type: u8, default: 0 }

  - name: NodeVersionReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Version (CC 0x86) Report from a *node*. Republished by
      the cc-translator from inbound ApplicationCommand frames whose
      ccData parses as a Version Report. Carries the node's Z-Wave
      library type, Z-Wave protocol version, and application version
      — distinct from the daemon's own version (see GetVersion).
      Naming: `Node` prefix distinguishes from the daemon's existing
      `Version` namespace; the wire CC is plain "Version".
      libraryType values mirror HostApi::LIBRARY_TYPE_* (1=Static
      Controller, 2=Controller, 3=Enhanced Slave, 4=Slave, …).
      v2 adds hardware version + per-firmware-target list; not
      decoded today.
    fields:
      - { name: sourceNodeId,         type: u8, default: 0 }
      - { name: libraryType,          type: u8, default: 0 }
      - { name: protocolVersion,      type: u8, default: 0 }
      - { name: protocolSubVersion,   type: u8, default: 0 }
      - { name: applicationVersion,   type: u8, default: 0 }
      - { name: applicationSubVersion, type: u8, default: 0 }

  - name: ZWavePlusInfoReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Z-Wave Plus Info (CC 0x5E) Report. Republished by the
      cc-translator from inbound ApplicationCommand frames whose
      ccData parses as a Z-Wave Plus Info Report. Identifies how a
      Z-Wave Plus node positions itself in the network (role / node
      type) and which device-database icons it advertises.
      Role-type values (per the Z-Wave Plus role-type spec):
        0x00 CENTRAL_STATIC_CONTROLLER
        0x01 SUB_STATIC_CONTROLLER
        0x02 PORTABLE_CONTROLLER
        0x03 PORTABLE_REPORTING_CONTROLLER
        0x04 PORTABLE_SLAVE
        0x05 ALWAYS_ON_SLAVE
        0x06 SLEEPING_REPORTING_SLAVE
        0x07 SLEEPING_LISTENING_SLAVE
      Node-type values:
        0x00 ZWAVEPLUS_NODE
        0x02 ZWAVEPLUS_IP_GATEWAY
    fields:
      - { name: sourceNodeId,      type: u8,  default: 0 }
      - { name: zwavePlusVersion,  type: u8,  default: 0 }
      - { name: roleType,          type: u8,  default: 0 }
      - { name: nodeType,          type: u8,  default: 0 }
      - { name: installerIconType, type: u16, default: 0 }
      - { name: userIconType,      type: u16, default: 0 }

  - name: ManufacturerSpecificReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Manufacturer Specific (CC 0x72) Report. Republished by
      the cc-translator from inbound ApplicationCommand frames whose
      ccData parses as a Manufacturer Specific Report. The three
      u16 identifiers come from the Z-Wave alliance assignment list
      and together pin down which physical device this node is.
    fields:
      - { name: sourceNodeId,   type: u8,  default: 0 }
      - { name: manufacturerId, type: u16, default: 0 }
      - { name: productTypeId,  type: u16, default: 0 }
      - { name: productId,      type: u16, default: 0 }

  - name: MultilevelSwitchReport
    category: transient
    direction: { publishers: [cc-translator], subscribers: [external-api] }
    doc: |
      Typed Multilevel Switch (CC 0x26) Report. Republished by the
      cc-translator from inbound ApplicationCommand frames whose
      ccData parses as a Multilevel Switch Report. v1 wire form
      carries only currentValue (targetValue mirrors current,
      wireFormatV2 = false); v2+ carries the full transition triple.
      Value byte semantics:
        0x00       = off / level 0
        0x01..0x63 = level 1..99
        0xFE       = unknown (Report-only)
        0xFF       = on / "restore last level" (Set-only)
      Duration byte:
        0x00       = instant
        0x01..0x7F = seconds
        0x80..0xFE = minutes (count = byte - 0x7F)
        0xFF       = factory default duration
    fields:
      - { name: sourceNodeId, type: u8,   default: 0 }
      - { name: currentValue, type: u8,   default: 0 }
      - { name: targetValue,  type: u8,   default: 0 }
      - { name: duration,     type: u8,   default: 0 }
      - { name: wireFormatV2, type: bool, default: false }

  # ---- 2d. Command events (D-Bus → ProtocolThread) ----------------
  # External transports translate semantic D-Bus calls into one of
  # these and publish; ProtocolThread subscribes and dispatches.

  - name: AddNodeCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Initiate or stop FUNC_ID_ZW_ADD_NODE_TO_NETWORK (0x4A).
    constants:
      - { name: MODE_ANY_NODE,            value: 0x01 }
      - { name: MODE_STOP,                value: 0x05 }
      - { name: MODE_STOP_REPLICATION,    value: 0x06 }
      - { name: MODE_SMART_START_INCLUDE, value: 0x08 }
      - { name: MODE_SMART_START_LISTEN,  value: 0x09 }
    fields:
      - { name: mode,              type: u8,             default: MODE_ANY_NODE }
      - { name: power,             type: bool,           default: false }
      - { name: nwi,               type: bool,           default: false }
      - { name: protocolLongRange, type: bool,           default: false }
      - { name: skipFlNeighbors,   type: bool,           default: false }
      - { name: sessionId,         type: u8,             default: 0 }
      - { name: includeHomeIds,    type: bool,           default: false }
      - { name: nwiHomeId,         type: "array<u8, 4>" }
      - { name: authHomeId,        type: "array<u8, 4>" }

  - name: RemoveNodeCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Initiate or stop FUNC_ID_ZW_REMOVE_NODE_FROM_NETWORK (0x4B).
    constants:
      - { name: MODE_ANY_NODE, value: 0x01 }
      - { name: MODE_STOP,     value: 0x05 }
    fields:
      - { name: mode,      type: u8,   default: MODE_ANY_NODE }
      - { name: power,     type: bool, default: false }
      - { name: nwe,       type: bool, default: false }
      - { name: sessionId, type: u8,   default: 0 }

  - name: RemoveFailedNodeCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Drive FUNC_ID_ZW_REMOVE_FAILED_NODE_ID (0x61) for an unresponsive node.
    fields:
      - { name: nodeId,    type: u8, default: 0 }
      - { name: sessionId, type: u8, default: 0 }

  - name: RequestNodeInfoCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: |
      Drive FUNC_ID_ZW_REQUEST_NODE_INFO (0x60) — asks the dongle to
      ferry a NodeInfo request to the target node. Synchronous result
      comes back as RequestNodeInfoStatus; the actual NodeInfo (when /
      if the node answers) arrives as NodeInfoUpdate, possibly never
      for sleeping nodes.
    fields:
      - { name: nodeId,    type: u8, default: 0 }
      - { name: sessionId, type: u8, default: 0 }

  - name: SetSwitchBinaryCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Drive a node's Binary Switch (CC 0x25) on/off state.
    fields:
      - { name: nodeId,     type: u8,   default: 0 }
      - { name: turnOn,     type: bool, default: false }
      - { name: callbackId, type: u8,   default: 0 }

  - name: GetSwitchBinaryCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's Binary Switch state.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: SetBasicCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: |
      Send a Basic (CC 0x20) Set. Spec semantics:
      0=off, 0x01..0x63=level 1..99, 0xFF=on/full/"previous level".
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: value,      type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: SetMultilevelSwitchCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: |
      Send a Multilevel Switch (CC 0x26) Set. Value semantics:
      0x00 off, 0x01..0x63 level 1..99, 0xFF "restore last level".
      Duration byte: 0x00 instant, 0x01..0x7F seconds,
      0x80..0xFE minutes (count = byte - 0x7F), 0xFF factory default.
      The daemon always emits the v2 wire form (value + duration);
      v1-only devices ignore the trailing duration byte per spec.
    constants:
      - { name: DURATION_DEFAULT, value: 0xFF }
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: value,      type: u8, default: 0 }
      - { name: duration,   type: u8, default: DURATION_DEFAULT }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetMultilevelSwitchCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's Multilevel Switch value.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetBatteryCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's Battery level.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetManufacturerSpecificCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's manufacturer / product identifiers.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetZWavePlusInfoCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's Z-Wave Plus role / node type and icon advertisements.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetNodeVersionCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: |
      Query a node's Version CC (0x86) Report — node firmware versions.
      Distinct from the daemon's GetVersion D-Bus method (which
      returns the daemon's own semver / git-describe).
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: SetWakeUpIntervalCommand
    category: command
    direction: { publishers: [external-api, orchestrator], subscribers: [zwave-protocol] }
    doc: |
      Send Wake Up Interval Set (CC 0x84) to a node. `seconds` is the
      24-bit unsigned interval the spec allows; values above
      0x00FFFFFF are clamped at encode time. `controllerNodeId` is
      the node the sleeper will phone home to — usually the daemon's
      own controller node ID. Published by InclusionOrchestrator
      (#67) when applying the per-device wake-up policy.
    fields:
      - { name: nodeId,           type: u8,  default: 0 }
      - { name: seconds,          type: u32, default: 0 }
      - { name: controllerNodeId, type: u8,  default: 0 }
      - { name: callbackId,       type: u8,  default: 0 }

  - name: GetWakeUpIntervalCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's current Wake Up interval.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: SendWakeUpNoMoreInformationCommand
    category: command
    direction: { publishers: [orchestrator, external-api], subscribers: [zwave-protocol] }
    doc: |
      Send WAKE_UP_NO_MORE_INFORMATION (CC 0x84 cmd 0x08) to a
      node, telling it to go back to sleep ASAP. Published by
      WakeUpOrchestrator (#68) after draining the pending queue;
      also exposed on D-Bus for diagnostics.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetBasicCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Query a node's Basic value.
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: SetAssociationCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Add members to a group on the Association CC (0x85).
    fields:
      - { name: nodeId,     type: u8,    default: 0 }
      - { name: groupId,    type: u8,    default: 0 }
      - { name: members,    type: bytes }
      - { name: callbackId, type: u8,    default: 0 }

  - name: RemoveAssociationCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Remove members from a group (empty members = remove all).
    fields:
      - { name: nodeId,     type: u8,    default: 0 }
      - { name: groupId,    type: u8,    default: 0 }
      - { name: members,    type: bytes }
      - { name: callbackId, type: u8,    default: 0 }

  - name: GetAssociationCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: groupId,    type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetAssociationGroupingsCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: SetMultichannelAssociationCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    doc: Multi Channel Association (CC 0x8E) with both whole-node and (node,endpoint) members.
    fields:
      - { name: nodeId,          type: u8,                    default: 0 }
      - { name: groupId,         type: u8,                    default: 0 }
      - { name: nodeMembers,     type: bytes }
      - { name: endpointMembers, type: list<EndpointMember> }
      - { name: callbackId,      type: u8,                    default: 0 }

  - name: RemoveMultichannelAssociationCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    fields:
      - { name: nodeId,          type: u8,                    default: 0 }
      - { name: groupId,         type: u8,                    default: 0 }
      - { name: nodeMembers,     type: bytes }
      - { name: endpointMembers, type: list<EndpointMember> }
      - { name: callbackId,      type: u8,                    default: 0 }

  - name: GetMultichannelAssociationCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: groupId,    type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

  - name: GetMultichannelAssociationGroupingsCommand
    category: command
    direction: { publishers: [external-api], subscribers: [zwave-protocol] }
    fields:
      - { name: nodeId,     type: u8, default: 0 }
      - { name: callbackId, type: u8, default: 0 }

# =====================================================================
# 3. D-Bus surface
# =====================================================================
# The system-bus contract published by ExternalApi::DBusBackend.

dbus:
  bus_name:    com.tiunda.ZWaved
  object_path: /com/tiunda/ZWaved
  interface:   com.tiunda.ZWaved1

  # ---- 3a. Methods ------------------------------------------------
  # `action` describes what the method does. Three shapes:
  #
  #   publish: <EventName>
  #     Take the inbound D-Bus arguments and publish them as the
  #     given MessageBus command event. Field mapping is by name
  #     unless `map:` is given. Return type is void (no out args).
  #
  #   publish_constant: { event: <Event>, fields: {<f>: <value>} }
  #     Publish a fixed shape (e.g. StopAddNode → AddNodeCommand
  #     with mode=MODE_STOP). Inbound D-Bus args fill any missing
  #     fields; everything else is the constant.
  #
  #   read_cached: <EventName>
  #     Return the latest retained value of the given state event.
  #     The struct shape comes from `returns:`.
  #
  #   custom: <name>
  #     Hand-written body. Codegen emits a forward declaration the
  #     daemon implements; bookkeeping fields below describe the
  #     return shape so the manifest still documents the contract.

  methods:

    # -- Inclusion / exclusion -------------------------------------
    - name: AddNode
      params:
        - { name: mode,       dbus: y, cpp: u8 }
        - { name: flags,      dbus: y, cpp: u8, doc: "bit 7=Power, 6=NWI, 5=Protocol, 4=SFLND" }
        - { name: sessionId,  dbus: y, cpp: u8 }
        - { name: nwiHomeId,  dbus: ay, cpp: bytes }
        - { name: authHomeId, dbus: ay, cpp: bytes }
      # Custom: the flags byte unpacks into four bool fields on
      # AddNodeCommand (power / nwi / protocolLongRange /
      # skipFlNeighbors), and the home-ID arrays are converted from
      # vector<u8> into array<u8, 4> with an `includeHomeIds`
      # computed flag — none of which the codegen expresses today.
      action:
        custom: emitAddNode

    - name: StopAddNode
      params:
        - { name: sessionId, dbus: y, cpp: u8 }
      action:
        publish_constant:
          event: AddNodeCommand
          fields: { mode: MODE_STOP }

    - name: RemoveNode
      params:
        - { name: mode,      dbus: y, cpp: u8 }
        - { name: flags,     dbus: y, cpp: u8, doc: "bit 7=Power, 6=NWE" }
        - { name: sessionId, dbus: y, cpp: u8 }
      # Custom: same flag-byte-unpack reason as AddNode.
      action:
        custom: emitRemoveNode

    - name: StopRemoveNode
      params:
        - { name: sessionId, dbus: y, cpp: u8 }
      action:
        publish_constant:
          event: RemoveNodeCommand
          fields: { mode: MODE_STOP }

    - name: RemoveFailedNode
      params:
        - { name: nodeId,    dbus: y, cpp: u8 }
        - { name: sessionId, dbus: y, cpp: u8 }
      action:
        publish: RemoveFailedNodeCommand

    - name: RequestNodeInfo
      params:
        - { name: nodeId,    dbus: y, cpp: u8 }
        - { name: sessionId, dbus: y, cpp: u8 }
      action:
        publish: RequestNodeInfoCommand

    # -- Application CCs -------------------------------------------
    - name: SetSwitchBinary
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: turnOn,     dbus: b, cpp: bool }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: SetSwitchBinaryCommand

    - name: GetSwitchBinary
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetSwitchBinaryCommand

    - name: SetBasic
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: value,      dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: SetBasicCommand

    - name: GetBasic
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetBasicCommand

    - name: SetMultilevelSwitch
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: value,      dbus: y, cpp: u8 }
        - { name: duration,   dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: SetMultilevelSwitchCommand

    - name: GetMultilevelSwitch
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetMultilevelSwitchCommand

    - name: GetBattery
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetBatteryCommand

    - name: GetManufacturerSpecific
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetManufacturerSpecificCommand

    - name: GetZWavePlusInfo
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetZWavePlusInfoCommand

    - name: GetNodeVersion
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetNodeVersionCommand

    - name: SetWakeUpInterval
      params:
        - { name: nodeId,           dbus: y, cpp: u8 }
        - { name: seconds,          dbus: u, cpp: u32, doc: "0..0x00FFFFFF; clamped to 24 bits" }
        - { name: controllerNodeId, dbus: y, cpp: u8 }
        - { name: callbackId,       dbus: y, cpp: u8 }
      action:
        publish: SetWakeUpIntervalCommand

    - name: GetWakeUpInterval
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetWakeUpIntervalCommand

    - name: SendWakeUpNoMoreInformation
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: SendWakeUpNoMoreInformationCommand

    - name: SetAssociation
      params:
        - { name: nodeId,     dbus: y,  cpp: u8 }
        - { name: groupId,    dbus: y,  cpp: u8 }
        - { name: members,    dbus: ay, cpp: bytes }
        - { name: callbackId, dbus: y,  cpp: u8 }
      action:
        publish: SetAssociationCommand

    - name: RemoveAssociation
      params:
        - { name: nodeId,     dbus: y,  cpp: u8 }
        - { name: groupId,    dbus: y,  cpp: u8 }
        - { name: members,    dbus: ay, cpp: bytes }
        - { name: callbackId, dbus: y,  cpp: u8 }
      action:
        publish: RemoveAssociationCommand

    - name: GetAssociation
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: groupId,    dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetAssociationCommand

    - name: GetAssociationGroupings
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetAssociationGroupingsCommand

    - name: SetMultichannelAssociation
      params:
        - { name: nodeId,          dbus: y,      cpp: u8 }
        - { name: groupId,         dbus: y,      cpp: u8 }
        - { name: nodeMembers,     dbus: ay,     cpp: bytes }
        - { name: endpointMembers, dbus: "a(yy)", cpp: "list<EndpointPair>" }
        - { name: callbackId,      dbus: y,      cpp: u8 }
      # Custom: the endpointMembers a(yy) inbound array converts
      # element-wise from sdbus::Struct<u8,u8> to EndpointMember,
      # which the codegen doesn't express today.
      action:
        custom: emitSetMultichannelAssociation

    - name: RemoveMultichannelAssociation
      params:
        - { name: nodeId,          dbus: y,      cpp: u8 }
        - { name: groupId,         dbus: y,      cpp: u8 }
        - { name: nodeMembers,     dbus: ay,     cpp: bytes }
        - { name: endpointMembers, dbus: "a(yy)", cpp: "list<EndpointPair>" }
        - { name: callbackId,      dbus: y,      cpp: u8 }
      # Custom: same EndpointMember conversion as Set above.
      action:
        custom: emitRemoveMultichannelAssociation

    - name: GetMultichannelAssociation
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: groupId,    dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetMultichannelAssociationCommand

    - name: GetMultichannelAssociationGroupings
      params:
        - { name: nodeId,     dbus: y, cpp: u8 }
        - { name: callbackId, dbus: y, cpp: u8 }
      action:
        publish: GetMultichannelAssociationGroupingsCommand

    # -- Cached-state queries --------------------------------------
    # `read_cached:` is documented as a first-class action in the
    # manifest, but the codegen treats these as `custom:` for now —
    # generating the per-event tuple construction and lock-and-copy
    # body needs richer type-system support and a convention for
    # how the daemon caches each event (whole-event vs. just the
    # `.nodes` field for NodeListChanged). Phase 3.5.
    - name: GetNodes
      params: []
      returns:
        type: list<NodeInfo>
        dbus: a(yyyyay)
      action:
        custom: emitGetNodes

    - name: GetDongleInfo
      params: []
      returns:
        struct:
          - { name: libraryVersion,   dbus: s,  cpp: string }
          - { name: libraryType,      dbus: y,  cpp: u8 }
          - { name: homeId,           dbus: ay, cpp: bytes }
          - { name: controllerNodeId, dbus: y,  cpp: u8 }
      action:
        custom: emitGetDongleInfo

    - name: GetInitData
      params: []
      returns:
        struct:
          - { name: serialApiVersion, dbus: y,  cpp: u8 }
          - { name: capabilities,     dbus: y,  cpp: u8 }
          - { name: nodeIds,          dbus: ay, cpp: bytes }
          - { name: chipType,         dbus: y,  cpp: u8 }
          - { name: chipVersion,      dbus: y,  cpp: u8 }
      action:
        custom: emitGetInitData

    # -- Custom (hand-written) -------------------------------------
    - name: GetVersion
      params: []
      returns:
        struct:
          - { name: semver,      dbus: s, source: Version::SEMVER }
          - { name: gitDescribe, dbus: s, source: Version::GIT_DESCRIBE }
      action:
        custom: emitGetVersion

    - name: GetNetworkStatus
      doc: |
        Aggregate snapshot drawing on multiple cached events
        (DongleStatus + DongleInfo + NodeListChanged + SessionStatus)
        plus daemon uptime. Hand-written today; a richer mapping
        notation could express it declaratively, but the surface is
        small enough that codegen for it isn't load-bearing.
      params: []
      returns:
        struct:
          - { name: dongleConnected,  dbus: b, source: cached.DongleStatus.connected }
          - { name: ttyPath,          dbus: s, source: cached.DongleStatus.ttyPath }
          - { name: homeId,           dbus: s, source: "hex(cached.DongleInfo.homeId)" }
          - { name: controllerNodeId, dbus: y, source: cached.DongleInfo.controllerNodeId }
          - { name: nodeCount,        dbus: u, source: "cached.NodeListChanged.nodes.size()" }
          - { name: sessionActive,    dbus: b, source: cached.SessionStatus.active }
          - { name: sessionCommandId, dbus: y, source: cached.SessionStatus.commandId }
          - { name: sessionId,        dbus: y, source: cached.SessionStatus.sessionId }
          - { name: uptimeSeconds,    dbus: t, source: "now() - startTime" }
      action:
        custom: emitGetNetworkStatus

  # ---- 3b. Signals ------------------------------------------------
  # Each signal is triggered by one or more MessageBus events. The
  # default mapping copies named fields straight through; CC-decoder
  # signals add a `decode:` step that runs an application/ codec on
  # the inbound `ccData` and rejects the trigger when it returns
  # std::nullopt.

  signals:

    - name: DongleStatus
      params:
        - { name: connected, dbus: b }
        - { name: ttyPath,   dbus: s }
      triggered_by: { event: DongleStatus }

    - name: DongleInfo
      params:
        - { name: libraryVersion,   dbus: s }
        - { name: libraryType,      dbus: y }
        - { name: homeId,           dbus: ay }
        - { name: controllerNodeId, dbus: y }
      triggered_by: { event: DongleInfo }

    - name: InitData
      params:
        - { name: serialApiVersion, dbus: y }
        - { name: capabilities,     dbus: y }
        - { name: nodeIds,          dbus: ay }
        - { name: chipType,         dbus: y }
        - { name: chipVersion,      dbus: y }
      triggered_by: { event: InitData }

    - name: NodeInclusionStatus
      params:
        - { name: sessionId,    dbus: y }
        - { name: status,       dbus: y }
        - { name: nodeId,       dbus: q }
        - { name: basicType,    dbus: y, source: basicDeviceType }
        - { name: genericType,  dbus: y, source: genericDeviceType }
        - { name: specificType, dbus: y, source: specificDeviceType }
        - { name: commandClasses, dbus: ay }
      triggered_by: { event: NodeInclusionStatus }

    - name: NodeExclusionStatus
      params:
        - { name: sessionId,    dbus: y }
        - { name: status,       dbus: y }
        - { name: nodeId,       dbus: q }
        - { name: basicType,    dbus: y, source: basicDeviceType }
        - { name: genericType,  dbus: y, source: genericDeviceType }
        - { name: specificType, dbus: y, source: specificDeviceType }
        - { name: commandClasses, dbus: ay }
      triggered_by: { event: NodeExclusionStatus }

    - name: SendDataStatus
      params:
        - { name: callbackId, dbus: y }
        - { name: txStatus,   dbus: y }
      triggered_by: { event: SendDataCallback }

    - name: ApplicationCommand
      params:
        - { name: rxStatus,     dbus: y }
        - { name: sourceNodeId, dbus: y }
        - { name: ccData,       dbus: ay }
      triggered_by: { event: ApplicationCommand }

    - name: RemoveFailedNodeStatus
      params:
        - { name: nodeId,    dbus: y }
        - { name: sessionId, dbus: y }
        - { name: phase,     dbus: y }
        - { name: status,    dbus: y }
      triggered_by: { event: RemoveFailedNodeStatus }

    - name: RequestNodeInfoStatus
      params:
        - { name: nodeId,    dbus: y }
        - { name: sessionId, dbus: y }
        - { name: accepted,  dbus: b, doc: "true iff the dongle started the request" }
      triggered_by: { event: RequestNodeInfoStatus }

    - name: NodeInfoUpdate
      params:
        - { name: status,             dbus: y, doc: "0x81 REQ_FAILED, 0x84 RECEIVED, others pass through" }
        - { name: nodeId,             dbus: y }
        - { name: basicDeviceType,    dbus: y, doc: "populated only for status=0x84" }
        - { name: genericDeviceType,  dbus: y, doc: "populated only for status=0x84" }
        - { name: specificDeviceType, dbus: y, doc: "populated only for status=0x84" }
        - { name: commandClasses,     dbus: ay, doc: "supported list, populated only for status=0x84" }
      triggered_by: { event: NodeInfoUpdate }

    - name: DaemonError
      params:
        - { name: severity, dbus: y, doc: "1=Info, 2=Warn, 3=Error, 4=Critical" }
        - { name: source,   dbus: s, doc: "publishing module name" }
        - { name: code,     dbus: y, doc: "DaemonError::CODE_* enum" }
        - { name: message,  dbus: s, doc: "human-readable; empty means 'no current error'" }
      triggered_by: { event: DaemonError }

    # -- Typed CC-report signals: trigger off the cc-translator's
    # republished typed events. The translator owns the codec call
    # so external-api never includes a CC codec header. Adding a new
    # typed signal: declare a typed bus event under `events:`, teach
    # the translator (src/cc-translator/) to publish it for the
    # matching ApplicationCommand frame, and add the signal entry
    # below.

    - name: SwitchBinaryReport
      params:
        - { name: sourceNodeId, dbus: y }
        - { name: state,        dbus: y, doc: "0=Off, 1=On, 2=Unknown" }
      triggered_by:
        event: BinarySwitchReport

    - name: SwitchMultilevelReport
      params:
        - { name: sourceNodeId, dbus: y }
        - { name: currentValue, dbus: y, doc: "0=off, 0x01..0x63=level 1..99, 0xFE=unknown, 0xFF=on" }
        - { name: targetValue,  dbus: y, doc: "same encoding as currentValue; mirrors current on v1 wire form" }
        - { name: duration,     dbus: y, doc: "0=instant, 0x01..0x7F=sec, 0x80..0xFE=min, 0xFF=default" }
      triggered_by:
        event: MultilevelSwitchReport

    - name: BatteryReport
      params:
        - { name: sourceNodeId, dbus: y }
        - { name: level,        dbus: y, doc: "0x00..0x64 = 0..100%, 0xFF = low-battery warning" }
        - { name: lowBattery,   dbus: b, doc: "true iff level == 0xFF" }
      triggered_by:
        event: BatteryReport

    - name: ManufacturerSpecificReport
      params:
        - { name: sourceNodeId,   dbus: y }
        - { name: manufacturerId, dbus: q }
        - { name: productTypeId,  dbus: q }
        - { name: productId,      dbus: q }
      triggered_by:
        event: ManufacturerSpecificReport

    - name: ZWavePlusInfoReport
      params:
        - { name: sourceNodeId,      dbus: y }
        - { name: zwavePlusVersion,  dbus: y, doc: "typically 0x02" }
        - { name: roleType,          dbus: y, doc: "0x00..0x07; see event for enum" }
        - { name: nodeType,          dbus: y, doc: "0x00 = node, 0x02 = IP gateway" }
        - { name: installerIconType, dbus: q }
        - { name: userIconType,      dbus: q }
      triggered_by:
        event: ZWavePlusInfoReport

    - name: NodeVersionReport
      params:
        - { name: sourceNodeId,          dbus: y }
        - { name: libraryType,           dbus: y, doc: "HostApi::LIBRARY_TYPE_* (1=StaticCtrl, 2=Ctrl, 3=EnhSlave, 4=Slave, …)" }
        - { name: protocolVersion,       dbus: y }
        - { name: protocolSubVersion,    dbus: y }
        - { name: applicationVersion,    dbus: y }
        - { name: applicationSubVersion, dbus: y }
      triggered_by:
        event: NodeVersionReport

    - name: WakeUpIntervalReport
      params:
        - { name: sourceNodeId,     dbus: y }
        - { name: seconds,          dbus: u, doc: "24-bit interval; 0 = stay-awake" }
        - { name: controllerNodeId, dbus: y }
      triggered_by:
        event: WakeUpIntervalReport

    - name: WakeUpNotification
      params:
        - { name: sourceNodeId, dbus: y }
      triggered_by:
        event: WakeUpNotification

# =====================================================================
# 4. Protocol modules
# =====================================================================
# A module is the daemon-side codec for one protocol feature — today a
# Z-Wave Command Class; a second-protocol daemon would model Zigbee
# clusters, KNX functional blocks, etc. the same way. Wire-specific
# identifiers (`class_byte`, `prefix`, per-command `byte`) live under
# nested `wire:` blocks so the rest of the schema stays protocol-
# agnostic. The codegen target is the
# `src/zwave-protocol/application/<Name>.{hpp,cpp}` pair; modules are
# consumed by ProtocolThread (encode → SendData) and by the typed-
# report D-Bus signals (decode → typed signal payload).

modules:

  - name: BinarySwitch
    # Per-command byte constants are emitted as <wire.prefix>_<CMD>,
    # mirroring the Z-Wave spec naming. Without an explicit
    # `wire.prefix:`, the codegen falls back to camelCase-to-
    # SCREAMING_SNAKE on the module name (which differs from spec for
    # several CCs — e.g. BinarySwitch's wire name is SWITCH_BINARY,
    # MultichannelAssociation's is MULTI_CHANNEL_ASSOCIATION).
    wire:
      class_byte: 0x25
      prefix: SWITCH_BINARY
    description: |
      Binary on/off control. SET takes a single value byte
      (0=off, 0xFF=on); REPORT carries the current state.
    constants:
      - { name: VALUE_OFF,     value: 0x00 }
      - { name: VALUE_ON,      value: 0xFF }
      - { name: VALUE_UNKNOWN, value: 0xFE }
    commands:
      - name: Set
        wire:
          byte: 0x01
          payload:
            - "turnOn ? VALUE_ON : VALUE_OFF"
        encode_args:
          - { name: turnOn, type: bool }
      - name: Get
        wire:
          byte: 0x02
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x03
        decoded_struct:
          - { name: rawValue, type: u8 }
          - { name: state,    type: enum, doc: "Off | On | Unknown" }

  - name: MultilevelSwitch
    wire:
      class_byte: 0x26
      prefix: SWITCH_MULTILEVEL
    description: |
      Multilevel control — dimmers, blinds, fan speed. SET takes a
      value byte plus (v2+) a duration byte; the daemon always emits
      the v2 wire form so v1-only devices ignore the trailing byte
      per spec.
    constants:
      - { name: VALUE_OFF,        value: 0x00 }
      - { name: VALUE_MAX,        value: 0x63 }
      - { name: VALUE_UNKNOWN,    value: 0xFE }
      - { name: VALUE_RESTORE,    value: 0xFF }
      - { name: DURATION_INSTANT, value: 0x00 }
      - { name: DURATION_DEFAULT, value: 0xFF }
    commands:
      - name: Set
        wire:
          byte: 0x01
          payload:
            - "value"
            - "duration"
        encode_args:
          - { name: value,    type: u8 }
          - { name: duration, type: u8 }
      - name: Get
        wire:
          byte: 0x02
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x03
        decoded_struct:
          - { name: currentValue, type: u8 }
          - { name: targetValue,  type: u8 }
          - { name: duration,     type: u8 }
          - { name: wireFormatV2, type: bool, doc: "true if 5-byte v2+ wire form" }

  - name: Battery
    wire:
      class_byte: 0x80
      prefix: BATTERY
    description: |
      Battery status reporting for battery-powered nodes. Get returns
      a Report carrying the battery percentage (0..100) or 0xFF as a
      low-battery warning. v2 adds charging / health bitfields; the
      decoder ignores them today and only surfaces the percentage +
      a derived lowBattery flag.
    constants:
      - { name: LEVEL_LOW_WARNING, value: 0xFF }
    commands:
      - name: Get
        wire:
          byte: 0x02
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x03
        decoded_struct:
          - { name: level,      type: u8,   doc: "raw wire byte: 0x00..0x64 = 0..100%, 0xFF = low" }
          - { name: lowBattery, type: bool, doc: "true iff level == LEVEL_LOW_WARNING" }

  - name: WakeUp
    wire:
      class_byte: 0x84
      prefix: WAKE_UP
    description: |
      Sleeping-node lifecycle. The Interval Set/Get/Report trio
      configures how often the node phones home; the Notification
      (node → host) signals "I'm briefly awake, send me anything
      pending"; NoMoreInformation (host → node) is the daemon's
      "go back to sleep now" reply.

      Set carries a 24-bit big-endian seconds field plus a
      single-byte controllerNodeId — too irregular for the
      manifest's payload generator, so encodeIntervalSet is
      hand-written in WakeUp.cpp. Get and NoMoreInformation are
      empty-payload, so their encoders come from the .gen.cpp.
    commands:
      - name: Set
        wire:
          byte: 0x04
      - name: Get
        wire:
          byte: 0x05
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x06
        decoded_struct:
          - { name: seconds,          type: u32 }
          - { name: controllerNodeId, type: u8 }
      - name: Notification
        wire:
          byte: 0x07
      - name: NoMoreInformation
        wire:
          byte: 0x08
          payload: []
        encode_args: []

  - name: NodeVersion
    wire:
      class_byte: 0x86
      prefix: VERSION
    description: |
      Z-Wave Version CC (0x86) — reports a *node's* Z-Wave library
      type, Z-Wave protocol version, and application version.
      Distinct from the daemon's own version (Version::SEMVER); the
      module is named `NodeVersion` to keep that distinction loud at
      every call site, but the wire `prefix:` stays `VERSION` so the
      generated `VERSION_GET` (0x11) and `VERSION_REPORT` (0x12)
      constants still match the Z-Wave spec. Commands live in the
      0x10s, not 0x01-0x05 like most CCs.

      v2 adds hardware version + a per-firmware-target list; v1 is
      what most v1/v2 nodes answer with and is what we decode today.
    commands:
      - name: Get
        wire:
          byte: 0x11
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x12
        decoded_struct:
          - { name: libraryType,           type: u8 }
          - { name: protocolVersion,       type: u8 }
          - { name: protocolSubVersion,    type: u8 }
          - { name: applicationVersion,    type: u8 }
          - { name: applicationSubVersion, type: u8 }

  - name: ZWavePlusInfo
    wire:
      class_byte: 0x5E
      prefix: ZWAVEPLUS_INFO
    description: |
      Z-Wave Plus identification. Get returns a Report carrying the
      Z-Wave Plus protocol version, role/node type, and a pair of
      device-database icon hints (installer + user). Unusually for a
      Z-Wave CC, GET is byte 0x01 and REPORT is byte 0x02 (most CCs
      use 0x02/0x03 or 0x04/0x05) — follow the spec, not the pattern.
    commands:
      - name: Get
        wire:
          byte: 0x01
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x02
        decoded_struct:
          - { name: zwavePlusVersion,  type: u8 }
          - { name: roleType,          type: u8 }
          - { name: nodeType,          type: u8 }
          - { name: installerIconType, type: u16 }
          - { name: userIconType,      type: u16 }

  - name: ManufacturerSpecific
    wire:
      class_byte: 0x72
      prefix: MANUFACTURER_SPECIFIC
    description: |
      Per-node identification — manufacturer ID, product type ID and
      product ID are all u16 values assigned by the Z-Wave alliance.
      Together they pin down which physical device the node is, which
      lets a controller look up device-specific quirks. v2 adds a
      Device Specific Get / Report pair for serial numbers / OEM
      data; not implemented today.
    commands:
      - name: Get
        wire:
          byte: 0x04
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x05
        decoded_struct:
          - { name: manufacturerId, type: u16 }
          - { name: productTypeId,  type: u16 }
          - { name: productId,      type: u16 }

  - name: Basic
    wire:
      class_byte: 0x20
      prefix: BASIC
    description: |
      Universal-fallback CC. Devices without a more specific CC for
      their primary behaviour map Basic onto whatever does make
      sense (a switch becomes on/off, a dimmer becomes 0..99).
    constants:
      - { name: VALUE_OFF,     value: 0x00 }
      - { name: VALUE_ON,      value: 0xFF }
      - { name: VALUE_UNKNOWN, value: 0xFE }
    commands:
      - name: Set
        wire:
          byte: 0x01
          payload:
            - "value"
        encode_args:
          - { name: value, type: u8 }
      - name: Get
        wire:
          byte: 0x02
          payload: []
        encode_args: []
      - name: Report
        wire:
          byte: 0x03
        decoded_struct:
          - { name: currentValue, type: u8 }
          - { name: targetValue,  type: u8 }
          - { name: duration,     type: u8 }
          - { name: wireFormatV2, type: bool, doc: "true if 5-byte v2+ wire form" }

  - name: Association
    wire:
      class_byte: 0x85
      prefix: ASSOCIATION
    description: |
      Per-group association lists -- group 1 is conventionally the
      lifeline, owned by the primary controller.
    commands:
      - { name: Set,             wire: { byte: 0x01 } }
      - { name: Get,             wire: { byte: 0x02 } }
      - { name: Report,          wire: { byte: 0x03 } }
      - { name: Remove,          wire: { byte: 0x04 } }
      - { name: GroupingsGet,    wire: { byte: 0x05 } }
      - { name: GroupingsReport, wire: { byte: 0x06 } }

  - name: MultichannelAssociation
    wire:
      class_byte: 0x8E
      prefix: MULTI_CHANNEL_ASSOCIATION
    description: |
      Like plain Association but each group can hold both whole-node
      members and (nodeId, endpoint) pair members, separated on the
      wire by MARKER = 0x00. REMOVE with both lists empty omits the
      MARKER and means "remove all members."
    constants:
      - { name: MARKER, value: 0x00 }
    commands:
      - { name: Set,             wire: { byte: 0x01 } }
      - { name: Get,             wire: { byte: 0x02 } }
      - { name: Report,          wire: { byte: 0x03 } }
      - { name: Remove,          wire: { byte: 0x04 } }
      - { name: GroupingsGet,    wire: { byte: 0x05 } }
      - { name: GroupingsReport, wire: { byte: 0x06 } }


# =====================================================================
# 5. Translation rules
# =====================================================================
# The cc-translator module subscribes to raw transient bus events
# (typically ApplicationCommand), runs application/ codec decoders,
# and republishes typed events declared under `events:` above. The
# generator-emitted CcTranslator.gen.cpp is the only place in the
# daemon that links a `src/zwave-protocol/application/` codec from a
# subscriber outside `src/zwave-protocol/` -- every other module
# stays codec-free and talks only via MessageBus.
#
# Adding a new typed-from-module report is three steps and zero new C++:
#   1. Declare the typed event under `events:` (category transient).
#   2. Add a rule below pointing at the typed event.
#   3. Add a `dbus.signals:` entry triggered_by the typed event.

translations:
  - publishes: BinarySwitchReport
    triggered_by: ApplicationCommand
    decode:
      codec: BinarySwitch.decodeReport
      input: ccData
      # Skip publish when the codec returns std::nullopt -- this
      # ApplicationCommand frame wasn't a Binary Switch Report.
      on_none: skip
    map:
      sourceNodeId: event.sourceNodeId
      state:        "static_cast<u8>(decoded.state)"

  - publishes: MultilevelSwitchReport
    triggered_by: ApplicationCommand
    decode:
      codec: MultilevelSwitch.decodeReport
      input: ccData
      on_none: skip
    map:
      sourceNodeId: event.sourceNodeId
      currentValue: decoded.currentValue
      targetValue:  decoded.targetValue
      duration:     decoded.duration
      wireFormatV2: decoded.wireFormatV2

  - publishes: BatteryReport
    triggered_by: ApplicationCommand
    decode:
      codec: Battery.decodeReport
      input: ccData
      on_none: skip
    map:
      sourceNodeId: event.sourceNodeId
      level:        decoded.level
      lowBattery:   decoded.lowBattery

  - publishes: ManufacturerSpecificReport
    triggered_by: ApplicationCommand
    decode:
      codec: ManufacturerSpecific.decodeReport
      input: ccData
      on_none: skip
    map:
      sourceNodeId:   event.sourceNodeId
      manufacturerId: decoded.manufacturerId
      productTypeId:  decoded.productTypeId
      productId:      decoded.productId

  - publishes: ZWavePlusInfoReport
    triggered_by: ApplicationCommand
    decode:
      codec: ZWavePlusInfo.decodeReport
      input: ccData
      on_none: skip
    map:
      sourceNodeId:      event.sourceNodeId
      zwavePlusVersion:  decoded.zwavePlusVersion
      roleType:          decoded.roleType
      nodeType:          decoded.nodeType
      installerIconType: decoded.installerIconType
      userIconType:      decoded.userIconType

  - publishes: NodeVersionReport
    triggered_by: ApplicationCommand
    decode:
      codec: NodeVersion.decodeReport
      input: ccData
      on_none: skip
    map:
      sourceNodeId:          event.sourceNodeId
      libraryType:           decoded.libraryType
      protocolVersion:       decoded.protocolVersion
      protocolSubVersion:    decoded.protocolSubVersion
      applicationVersion:    decoded.applicationVersion
      applicationSubVersion: decoded.applicationSubVersion

  - publishes: WakeUpIntervalReport
    triggered_by: ApplicationCommand
    decode:
      codec: WakeUp.decodeIntervalReport
      input: ccData
      on_none: skip
    map:
      sourceNodeId:     event.sourceNodeId
      seconds:          decoded.seconds
      controllerNodeId: decoded.controllerNodeId

  - publishes: WakeUpNotification
    triggered_by: ApplicationCommand
    decode:
      codec: WakeUp.decodeNotification
      input: ccData
      on_none: skip
    map:
      sourceNodeId: event.sourceNodeId
