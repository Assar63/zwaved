# zwaved daemon configuration. Minimal INI-flavoured key/value file
# parsed by src/config/Config.cpp — no third-party parser involved.
#
# Install:    cp etc/zwaved.conf /etc/zwaved/zwaved.conf
# Override:   set $ZWAVED_CONFIG to point at a different file.
#
# Every key below is optional — missing keys keep the daemon's
# built-in defaults. A missing config file is not an error; the
# daemon logs "Config: no config file at ... — publishing defaults"
# and continues.
#
# Internally each section is published as one retained event on the
# in-process MessageBus; modules subscribe and read the cached value
# via replay-on-subscribe. There is no SIGHUP-style reload yet —
# restart the daemon to pick up changes.

[logger]
# Minimum severity that gets queued. Producers below this level drop
# the message at the call site (no allocation, no queue churn).
# Accepts: debug | info | warn | error.    Default: info.
min_level = info

[storage]
# Directory holding nodes.db (the included-node registry). Resolution
# order: this key first, then the ZWAVED_STATE_DIR env var, then
# /var/lib/zwaved. The directory is created on first use.
state_dir = /var/lib/zwaved

[dongles]
# USB dongles the monitor thread will accept. Format per row:
#   accept = <vid>:<pid>:<name>
# vid and pid are 4-character lowercase hex strings (matched
# verbatim against the udev sysattrs); name is informational.
# Repeat the `accept` key as many times as needed.
accept = 0658:0200:Aeotec Z-Stick Gen5
# accept = 0658:0280:Aeotec Z-Stick 7

[behavior]
# When an inclusion completes for a Z-Wave Plus node (its supported
# CC list contains both 0x5E COMMAND_CLASS_ZWAVEPLUS_INFO and 0x85
# COMMAND_CLASS_ASSOCIATION), the daemon queues a
#   SetAssociation(node, group=1, members=[controllerNodeId])
# itself so the lifeline reports flow back without operator action.
# Set to false to leave new nodes untouched and use the manual
# `SetAssociation` D-Bus method or the terminal `[L]` action.
# Accepts: true | false | yes | no | 1 | 0.    Default: true.
auto_lifeline = true
